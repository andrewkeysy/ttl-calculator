function taxableBase(stateCode, {purchasePrice,msrp,tradeIn,rebate,transport,warranty,docFee}) {
  const base = parseFloat(purchasePrice)||parseFloat(msrp)||0;
  const ti   = parseFloat(tradeIn)||0;
  const rb   = parseFloat(rebate)||0;
  const tr   = parseFloat(transport)||0;
  const wa   = parseFloat(warranty)||0;
  const doc  = parseFloat(docFee)||0;
  const rules = {
    NV:{tradeIn:true, rebate:true,  transport:true,  warranty:true,  doc:true },
    AZ:{tradeIn:true, rebate:false, transport:true,  warranty:false, doc:false},
    CO:{tradeIn:true, rebate:true,  transport:true,  warranty:true,  doc:true },
    WY:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    MT:{tradeIn:false,rebate:false, transport:false, warranty:false, doc:false},
    WA:{tradeIn:true, rebate:true,  transport:true,  warranty:true,  doc:true },
    ID:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    NM:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    CA:{tradeIn:true, rebate:true,  transport:true,  warranty:false, doc:false},
    UT:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    TX:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    OR:{tradeIn:false,rebate:false, transport:false, warranty:false, doc:false},
    MD:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    VA:{tradeIn:false,rebate:true,  transport:false, warranty:false, doc:false},
    FL:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    GA:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    NC:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    TN:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    IL:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    IN:{tradeIn:true, rebate:false, transport:false, warranty:false, doc:false},
    OH:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    MI:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    MN:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    IA:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    MO:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    WI:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    AL:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    AR:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    KY:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    LA:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    MS:{tradeIn:true, rebate:false, transport:false, warranty:false, doc:false},
    OK:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    SC:{tradeIn:true, rebate:false, transport:false, warranty:false, doc:false},
    WV:{tradeIn:true, rebate:false, transport:false, warranty:false, doc:false},
    MA:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    NJ:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    NY:{tradeIn:true, rebate:false, transport:false, warranty:false, doc:false},
    PA:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    CT:{tradeIn:true, rebate:false, transport:false, warranty:false, doc:false},
    DE:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    ME:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    NH:{tradeIn:false,rebate:false, transport:false, warranty:false, doc:false},
    RI:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    VT:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    AK:{tradeIn:false,rebate:false, transport:false, warranty:false, doc:false},
    HI:{tradeIn:false,rebate:false, transport:false, warranty:false, doc:false},
    ND:{tradeIn:true, rebate:false, transport:false, warranty:false, doc:false},
    SD:{tradeIn:true, rebate:false, transport:false, warranty:false, doc:false},
    NE:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
    KS:{tradeIn:true, rebate:true,  transport:false, warranty:false, doc:false},
  };
  const r = rules[stateCode]||rules.NV;
  let taxBase = base;
  if(r.tradeIn)   taxBase -= ti;
  if(r.rebate)    taxBase -= rb;
  if(r.transport) taxBase += tr;
  if(r.warranty)  taxBase += wa;
  if(r.doc)       taxBase += doc;
  return Math.max(0, taxBase);
}

const STATE_DATA = {
  NV:{
    name:"Nevada",lastVerified:"Mar 2026",
    salesTaxNote:"County-level. Dealer sales only; private party exempt.",
    salesTaxUpdateFreq:"Annual (July)",
    inputs:["msrp","year","county","newVehicle"],
    counties:["Clark (Las Vegas) — 8.375%","Washoe (Reno) — 8.265%","Carson City — 7.600%","Churchill — 7.600%","Nye — 7.600%","Storey — 7.600%","White Pine — 7.725%","Douglas — 7.100%","Elko — 7.100%","Lander — 7.100%","Lincoln — 7.100%","Lyon — 7.100%","Pershing — 7.100%","Other / Rural — 6.850%"],
    calculate:(deal)=>{
      const {msrp,modelYear,county,newVehicle}=deal;
      const age=new Date().getFullYear()-parseInt(modelYear);
      let dep=0.35;
      if(age===1)dep*=0.95;
      else if(age>=2)dep=Math.max(0.35*0.15,0.35*0.95*Math.pow(0.90,age-1));
      const dmv=parseFloat(msrp)*dep;
      const gst=Math.max(16,dmv*0.04);
      const sgst=(county.includes("Clark")||county.includes("Churchill"))?dmv*0.01:0;
      // DMV pollution control fee: $6 collected by DMV for Clark & Washoe counties
      // Separate smog test at licensed station costs $20–$40+ (not collected by DMV)
      const em=(county.includes("Clark")||county.includes("Washoe"))?6:0;
      const rateMap={"Clark":0.08375,"Washoe":0.08265,"Carson":0.076,"Churchill":0.076,"Nye":0.076,"Storey":0.076,"White Pine":0.07725,"Douglas":0.071,"Elko":0.071,"Lander":0.071,"Lincoln":0.071,"Lyon":0.071,"Pershing":0.071};
      const countyKey=Object.keys(rateMap).find(k=>county.includes(k))||null;
      const salesTaxRate=countyKey?rateMap[countyKey]:0.0685;
      const taxBase=taxableBase("NV",deal);
      const salesTax=taxBase>0?taxBase*salesTaxRate:0;
      return[
        {label:"Base Registration Fee",amount:33.00},
        {label:"Governmental Services Tax (GST)",amount:+gst.toFixed(2),note:"35% MSRP × depreciation × 4¢/$1. Min $16. Tax-deductible on federal return."},
        ...(sgst>0?[{label:"Supplemental GST (Clark/Churchill Co.)",amount:+sgst.toFixed(2),note:"1¢ per $1 of depreciated DMV value — voter-approved highway construction fund"}]:[]),
        ...(em>0?[{label:"Pollution Control Fee",amount:em,note:"DMV fee for Clark & Washoe only. Separate smog test at licensed station also required ($20–$40, not collected by DMV)."}]:[]),
        ...(newVehicle?[{label:"Title Fee (first-time NV title)",amount:28.25}]:[]),
        ...(salesTax>0?[{label:`Sales Tax (${(salesTaxRate*100).toFixed(3)}% — ${countyKey||"Rural"} Co.)`,amount:+salesTax.toFixed(2),note:"Dealer sales only. Private party, family sales and gifts are fully exempt.",isTax:true}]:[]),
      ];
    },
    notes:"GST is the largest cost and decreases annually as MSRP depreciates — tax-deductible on federal return. SGST applies only to Clark & Churchill counties. Smog test required at licensed station (Clark & Washoe) — ~$20–$40, paid to testing station, not DMV. All rates verified Mar 2026 from dmv.nv.gov and tax.nv.gov.",
  },
  AZ:{
    name:"Arizona",lastVerified:"Mar 2026",
    salesTaxNote:"State TPT 5.6% + city/local tax. Dealer sales only — private party is exempt.",
    salesTaxUpdateFreq:"Periodic (check AZ Dept of Revenue)",
    inputs:["msrp","year","newVehicle"],
    calculate:(deal)=>{
      const {msrp,modelYear,newVehicle}=deal;
      const age=new Date().getFullYear()-parseInt(modelYear);
      let assessed=parseFloat(msrp)*0.60;
      for(let i=0;i<age;i++)assessed*=0.8375;
      assessed=Math.max(assessed,parseFloat(msrp)*0.006);
      const vlt=(assessed/100)*(age===0?2.80:2.89);
      const taxBase=taxableBase("AZ",deal);
      const stateTax=taxBase>0?taxBase*0.056:0;
      return[
        {label:"Vehicle License Tax (VLT)",amount:+vlt.toFixed(2),note:"60% of MSRP × 0.8375^age × $2.80/$2.89 per $100. Decreases each year."},
        {label:"Registration Fee",amount:8.00,note:"Standard passenger vehicle rate"},
        {label:"Air Quality Research Fee",amount:1.50},
        {label:"Air Quality Compliance Fee",amount:0.25,note:"Maricopa & Pima counties (Phoenix/Tucson metro) only"},
        {label:"Title Fee",amount:4.00},
        {label:"Plate Fee",amount:5.00,note:"Standard plate — specialty plates higher"},
        ...(stateTax>0?[{label:"State Transaction Privilege Tax (5.60%)",amount:+stateTax.toFixed(2),note:"Dealer sales only. Local city tax adds ~1–3% (Phoenix metro ~8.3% total, Tucson ~8.1%). Private party in-state sales are fully exempt.",isTax:true}]:[]),
      ];
    },
    notes:"All AZ DMV fees verified Mar 2026 — unchanged from prior rates (servicearizona.com & azdot.gov). VLT is the largest cost and decreases annually. AZ taxes the pre-rebate price — rebates do NOT reduce TPT base. No county variation on DMV fees. Local TPT adds ~2.7% in Phoenix metro, ~2.5% in Tucson.",
  },
  CO:{
    name:"Colorado",lastVerified:"Mar 2026",
    salesTaxNote:"State 2.9% + county + city. Highly variable by jurisdiction.",
    salesTaxUpdateFreq:"Periodic (CO Dept of Revenue updates)",
    inputs:["msrp","year","weight","county"],
    counties:["Denver (~9.15%)","El Paso / Colorado Springs (~6.20%)","Arapahoe (~6.75%)","Jefferson (~6.50%)","Adams (~6.75%)","Boulder (~8.845%)","Larimer (~6.55%)","Weld (~5.90%)","Other (~5.90%)"],
    calculate:(deal)=>{
      const {msrp,modelYear,weight,county}=deal;
      const age=new Date().getFullYear()-parseInt(modelYear);
      const tv=parseFloat(msrp)*0.85;
      // SOT rates — Class C (cars/SUVs): verified Mar 2026 from dmv.colorado.gov
      const sotRate=age<=1?0.021:age<=2?0.015:age<=3?0.012:age<=4?0.009:age<=9?0.0045:null;
      const owt=sotRate!==null?Math.max(3.00,tv*sotRate):3.00;
      const w=parseInt(weight)||3500;
      // Base reg: $6 + $0.60 per 100 lbs over 2000 lbs (CRS 42-3-306)
      const base=+(6+(Math.max(0,w-2000)/100*0.60)).toFixed(2);
      // FASTER Road Safety Surcharge (Sept 2025–Aug 2027 rates — dmv.colorado.gov)
      const rs=w<=2000?12.30:w<=5000?19.30:w<=10000?24.30:33.30;
      // FASTER Bridge Safety Surcharge (dmv.colorado.gov)
      const bridge=w<=2000?13:w<=5000?18:w<=10000?23:29;
      // Age-based plate tab fee (CO DMV fact sheet: <7=$9, 7-9=$7, 10+=$5)
      const plateFee=age<7?9:age<10?7:5;
      // County sales tax — verified Mar 2026
      const coRates={"Denver":0.0915,"El Paso":0.062,"Arapahoe":0.0675,"Jefferson":0.065,"Adams":0.0675,"Boulder":0.08845,"Larimer":0.0655,"Weld":0.059};
      const countyKey=Object.keys(coRates).find(k=>county&&county.includes(k))||null;
      const salesTaxRate=countyKey?coRates[countyKey]:0.059;
      const taxBase=taxableBase("CO",deal);
      const salesTax=taxBase>0?taxBase*salesTaxRate:0;
      return[
        {label:"Specific Ownership Tax (SOT)",amount:+owt.toFixed(2),note:"Tax-deductible on federal return — decreases each year. 85% MSRP × age rate."},
        {label:"Base Registration Fee (weight-based)",amount:base,note:"$6 + $0.60/100 lbs over 2,000 lbs"},
        {label:"Road Safety Fee (FASTER)",amount:rs,note:"Sept 2025–Aug 2027 rates. Increases Sept 2027."},
        {label:"Bridge Safety Fee (FASTER)",amount:bridge,note:"Weight-tiered — ≤5,000=$18 / ≤10,000=$23 / >10,000=$29"},
        {label:"Plate Tab Fee (age-based)",amount:plateFee,note:"<7 yrs=$9 / 7–9 yrs=$7 / 10+ yrs=$5"},
        {label:"Clerk Hire Fee",amount:4.00},
        {label:"Emergency Medical Services Fee",amount:2.00},
        {label:"Insurance Database Fee (MIIDB)",amount:0.60,note:"$0.50 insurance + $0.10 MIIDB"},
        {label:"POST Fee",amount:1.00,note:"Peace Officer Standards & Training"},
        {label:"County Road & Bridge Fee",amount:0.94},
        ...(salesTax>0?[{label:`Sales Tax (~${(salesTaxRate*100).toFixed(2)}% — ${countyKey||"CO"} County)`,amount:+salesTax.toFixed(2),note:"State 2.9% + county + city. Verify exact rate with county.",isTax:true}]:[]),
      ];
    },
    notes:"SOT is the largest cost and decreases annually — tax-deductible on federal return. FASTER fees updated Sept 2025 and increase again Sept 2027. Sales tax varies widely: Denver 9.15%, Boulder 8.85%, most rural counties ~5.9%. Rates verified Mar 2026 from dmv.colorado.gov.",
  },
  WY:{
    name:"Wyoming",lastVerified:"Mar 2026",
    salesTaxNote:"4% state + up to 3% county option tax. Rates vary by county referendum.",
    salesTaxUpdateFreq:"Annual (county option taxes can change via voter referendum)",
    inputs:["year","msrp","county"],
    counties:["Teton / Jackson (7%)","Laramie / Cheyenne (6%)","Natrona / Casper (6%)","Sweetwater / Rock Springs (6%)","Albany / Laramie-UW (6%)","Sheridan (6%)","Campbell / Gillette (5%)","Fremont / Riverton (5%)","Other (5%)"],
    calculate:(deal)=>{
      const {modelYear,msrp,county}=deal;
      const yr=new Date().getFullYear();
      const age=yr-parseInt(modelYear); // 0=current year, 1=1yr old, etc.
      // County fee: MSRP × depreciation factor × 3% (W.S. 31-3-101)
      // Depreciation by year of service (age+1): yr1=60%, yr2=52%, yr3=45%, yr4=37%, yr5=30%, yr6+=15%
      const depFactors=[0.60,0.52,0.45,0.37,0.30,0.15];
      const dep=depFactors[Math.min(age,depFactors.length-1)];
      const countyFee=(parseFloat(msrp)||0)*dep*0.03;
      // Sales tax rates by county (2025/2026 — verified via official Teton Co. site & WY DOR data)
      const wyRates={"Teton":0.07,"Laramie":0.06,"Natrona":0.06,"Sweetwater":0.06,"Albany":0.06,"Sheridan":0.06,"Campbell":0.05,"Fremont":0.05};
      const countyKey=Object.keys(wyRates).find(k=>county&&county.includes(k))||null;
      const salesTaxRate=countyKey?wyRates[countyKey]:0.05;
      const taxBase=taxableBase("WY",deal);
      const salesTax=taxBase>0?taxBase*salesTaxRate:0;

async function decodeVIN(vin) {
  const res=await fetch(`https://vpic.nhtsa.dot.gov/api/vehicles/decodevin/${vin}?format=json`);
  const data=await res.json();
  const get=v=>(data.Results||[]).find(r=>r.Variable===v)?.Value||"";
  return{make:get("Make"),model:get("Model"),year:get("Model Year"),bodyClass:get("Body Class"),trim:get("Trim")};
}

async function lookupZIP(zip){
  const res=await fetch(
    `https://nominatim.openstreetmap.org/search?postalcode=${zip}&country=US&addressdetails=1&format=json&limit=1`
  );
  if(!res.ok) throw new Error("API error");
  const data=await res.json();
  if(!data||!data.length) return null;
  const addr=data[0].address;
  const stateCode=(addr["ISO3166-2-lvl4"]||"").replace("US-","").trim()||null;
  const countyName=(addr.county||addr.municipality||"").replace(/ (County|Parish|Borough|Census Area)$/i,"").trim();
  const city=addr.city||addr.town||addr.village||addr.hamlet||addr.suburb||"";
  if(!stateCode) return null;
  return{stateCode,countyName,city};
}

  const [bufPct,setBufPct]=useState(null);
  const [procFee,setProcFee]=useState(0);
  const [aKey,setAKey]=useState(0);
  const [dealOpen,setDealOpen]=useState(false);
  const [vin,setVin]=useState("");
  const [vinLoading,setVinLoading]=useState(false);
  const [vinResult,setVinResult]=useState(null);
  const [vinError,setVinError]=useState("");
  const [msrpMsg,setMsrpMsg]=useState("");
  const [promptCopied,setPromptCopied]=useState(false);
  const [zip,setZip]=useState("");
  const [zipLoading,setZipLoading]=useState(false);
  const [zipResult,setZipResult]=useState(null);
  const [zipError,setZipError]=useState("");
  const pendingCounty=React.useRef(null);

  const sd=STATE_DATA[sel];
  const cx=COMPLEXITY[sel];

  useEffect(()=>{const pc=pendingCounty.current;pendingCounty.current=null;setResults(null);setInputs(pc?{county:pc}:{});setDeal({});},[sel]);

  const hi=(k,v)=>setInputs(p=>({...p,[k]:v}));
  const hd=(k,v)=>setDeal(p=>({...p,[k]:v}));

  const runZIP=async()=>{
    if(zip.length!==5||!/^\d+$/.test(zip)){setZipError("Enter a valid 5-digit ZIP code");return;}
    setZipLoading(true);setZipError("");setZipResult(null);
    try{
      const r=await lookupZIP(zip);
      if(!r||!r.stateCode){setZipError("ZIP not found — check the number and try again.");}
      else{
        setZipResult(r);
        if(STATE_DATA[r.stateCode]){
          const sd2=STATE_DATA[r.stateCode];
          let match=null;
          if(sd2.counties&&r.countyName){
            const cn=r.countyName.toLowerCase();
            match=sd2.counties.find(c=>c.toLowerCase()===cn||c.toLowerCase().includes(cn)||cn.includes(c.toLowerCase().split(/[/(~]/)[0].trim()));
          }
          if(r.stateCode===sel){
            // Same state — update county directly, no state change needed
            if(match) hi("county",match);
          }else{
            // Different state — store county for useEffect to apply after state resets inputs
            if(match) pendingCounty.current=match;
            setSel(r.stateCode);
          }
        }else{setZipError("State "+r.stateCode+" not yet in calculator.");}
      }
    }catch(e){setZipError("Network error. Check your connection and try again.");}
    setZipLoading(false);
  };

  const runVIN=async()=>{
    if(vin.length!==17){setVinError("VIN must be exactly 17 characters");return;}
    setVinLoading(true);setVinError("");setVinResult(null);setMsrpMsg("");
    try{
      const r=await decodeVIN(vin.trim().toUpperCase());
      if(!r.make){setVinError("Could not decode VIN — check the number and try again.");}
      else{
        setVinResult(r);
        if(r.year)hi("year",r.year);
        const match=Object.keys(MSRP_TABLE).find(k=>k.toLowerCase().includes((r.model||"").toLowerCase()));
        if(match&&r.year&&MSRP_TABLE[match][parseInt(r.year)]){
          const found=MSRP_TABLE[match][parseInt(r.year)];
          hi("msrp",String(found));
          setMsrpMsg(`✓ Found: ${match} ${r.year} → $${found.toLocaleString()}`);
        }else{
          setMsrpMsg("Not in MSRP table — please enter MSRP manually.");
        }
      }
    }catch(e){setVinError("Network error decoding VIN. Check your internet connection and try again.");}
    setVinLoading(false);
  };

  const buildPrompt=()=>{
    if(!vinResult)return"";
    const v=vinResult;
    const stateInputs=sd.inputs||[];
    const needsMSRP=stateInputs.includes("msrp");
    const needsWeight=stateInputs.includes("weight");
    const msrpVal=inputs.msrp?("$"+Number(inputs.msrp).toLocaleString()):null;
    const missing=[];
    if(needsMSRP&&!msrpVal)missing.push({id:"MSRP",ask:"Original MSRP (sticker price when new) for a "+v.year+" "+v.make+" "+v.model+(v.trim?" ("+v.trim+" trim)":"")});
    if(needsWeight)missing.push({id:"WEIGHT",ask:"Curb weight in lbs for a "+v.year+" "+v.make+" "+v.model+(v.trim?" ("+v.trim+" trim)":"")});
    if(sel==="OR")missing.push({id:"MPG",ask:"Combined EPA MPG for a "+v.year+" "+v.make+" "+v.model+(v.trim?" ("+v.trim+" trim)":"")+" -- needed for OR registration tier (0-19 / 20-39 / 40+)"});
    if(sel==="MO")missing.push({id:"HP",ask:"Taxable horsepower for a "+v.year+" "+v.make+" "+v.model+(v.trim?" ("+v.trim+" trim)":"")+" -- needed for MO registration bracket"});
    const alreadyHave=[];
    if(msrpVal)alreadyHave.push("MSRP: "+msrpVal);
    alreadyHave.push("Year: "+v.year,"Make: "+v.make,"Model: "+v.model);
    if(v.trim)alreadyHave.push("Trim: "+v.trim);
    if(missing.length===0){

  };

      ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
    }
    setPromptCopied(true);
    setTimeout(()=>setPromptCopied(false),2500);
  };

                <input value={vin} onChange={e=>setVin(e.target.value.toUpperCase())} placeholder="Enter 17-digit VIN" maxLength={17}
                  style={{flex:1,padding:"9px 12px",borderRadius:7,border:`1.5px solid ${BRAND}70`,fontSize:13,fontFamily:"monospace",fontWeight:600,background:"#fff",color:TEXT,letterSpacing:"0.05em"}}/>
                <button onClick={runVIN} disabled={vinLoading} style={{padding:"9px 14px",borderRadius:7,border:"none",background:vinLoading?"#e5e7eb":BRAND,color:vinLoading?"#9ca3af":"#1a1f2e",fontWeight:700,fontSize:12,cursor:vinLoading?"not-allowed":"pointer",whiteSpace:"nowrap"}}>
                  {vinLoading?"…":"Decode"}
                </button>
              </div>
              {vinError&&<div style={{fontSize:11,color:"#dc2626",marginBottom:6,lineHeight:1.4}}>{vinError}</div>}
              {vinResult&&(
                <div style={{background:"#fff",borderRadius:7,padding:12,border:`1px solid ${BRAND}40`,fontSize:12,marginBottom:6}}>
                  <div style={{fontWeight:700,color:TEXT,marginBottom:4}}>{vinResult.year} {vinResult.make} {vinResult.model}{vinResult.trim?` — ${vinResult.trim}`:""}</div>
                  <div style={{color:TEXT_MID,fontSize:11,marginBottom:8}}>{vinResult.bodyClass}</div>
                  {msrpMsg&&<div style={{fontSize:11,padding:"6px 10px",borderRadius:5,background:msrpMsg.startsWith("✓")?"#f0fdf4":"#fef9e7",color:msrpMsg.startsWith("✓")?"#15803d":"#92400e",border:`1px solid ${msrpMsg.startsWith("✓")?"#bbf7d0":"#fde68a"}`,marginBottom:10}}>{msrpMsg}</div>}
                  <button onClick={copyPrompt} style={{width:"100%",padding:"9px 12px",borderRadius:7,border:`1.5px solid ${BRAND}`,background:promptCopied?"#f0fdf4":BRAND_BG,color:promptCopied?"#15803d":BRAND_DARK,fontWeight:700,fontSize:11,cursor:"pointer",letterSpacing:"0.04em",textTransform:"uppercase",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                    <span>{promptCopied?"✓":"📋"}</span>
                    {promptCopied?"Copied! Paste into Claude →":"Copy Claude Prompt for This Vehicle"}
                  </button>
                  <div style={{fontSize:10,color:TEXT_MUTED,marginTop:6,lineHeight:1.4}}>Generates a prompt asking Claude for MSRP, curb weight, and {sd.name}-specific registration details for this exact vehicle.</div>
                </div>
              )}
              <div style={{fontSize:10,color:TEXT_MUTED,lineHeight:1.5}}>Free NHTSA API — no key needed. Auto-fills year + MSRP if vehicle is in our table.</div>
            </div>

            {/* VEHICLE DETAILS */}
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <SectionHeader>Vehicle Details</SectionHeader>
              {sd.inputs.includes("msrp")&&(
                <Field label="Original MSRP ($)" hint="Sticker price when new — used for VLF, VLT, GST calculations">
                  <DollarInput value={inputs.msrp||""} onChange={v=>hi("msrp",v)} placeholder="e.g. 35000"/>
                </Field>
              )}
              {sd.inputs.includes("msrp")&&(
                <Field label="Purchase / Sale Price ($)" hint="Actual transaction price — used for sales tax calculation">
                  <DollarInput value={inputs.purchasePrice||""} onChange={v=>hi("purchasePrice",v)} placeholder="e.g. 32500"/>
                </Field>
              )}
              {sd.inputs.includes("year")&&(
                <Field label="Model Year">
                  <input value={inputs.year||""} onChange={e=>hi("year",e.target.value)} placeholder={`e.g. ${new Date().getFullYear()-2}`} type="number" style={iSt}/>
                </Field>
              )}
              {sd.inputs.includes("weight")&&(
                <Field label="Vehicle Weight (lbs)">
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <input value={inputs.weight||""} onChange={e=>hi("weight",e.target.value)} placeholder="e.g. 3500" type="number" style={{...iSt,flex:1}}/>
                    <span style={{fontSize:11,color:TEXT_MUTED}}>lbs</span>
                  </div>
                </Field>
              )}
              {sd.inputs.includes("county")&&sd.counties&&(
                <Field label="County / Region">
                  <select value={inputs.county||""} onChange={e=>hi("county",e.target.value)} style={sSt}>
                    <option value="">Select county…</option>
                    {sd.counties.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                </Field>
              )}
              {sd.inputs.includes("newVehicle")&&(
                <Field label="New or Used?">
                  <div style={{display:"flex",gap:8}}>
                    {[["yes","New"],["no","Used"]].map(([v,l])=>(
                      <button key={v} onClick={()=>hi("newVehicle",v)} style={{flex:1,padding:"9px",borderRadius:7,border:`1.5px solid ${inputs.newVehicle===v?BRAND:BORDER}`,background:inputs.newVehicle===v?BRAND_BG:"#fafafa",color:inputs.newVehicle===v?BRAND_DARK:TEXT_MID,fontWeight:inputs.newVehicle===v?700:400,fontSize:13,cursor:"pointer"}}>{l}</button>
                    ))}
                  </div>
                </Field>
              )}
              {sd.inputs.includes("inRTA")&&(
                <Field label="In Sound Transit RTA District?" hint="King / Pierce / Snohomish counties only">
                  <div style={{display:"flex",gap:8}}>
                    {[["yes","Yes — In RTA"],["no","No — Outside RTA"]].map(([v,l])=>(
                      <button key={v} onClick={()=>hi("inRTA",v)} style={{flex:1,padding:"8px",borderRadius:7,border:`1.5px solid ${inputs.inRTA===v?BRAND:BORDER}`,background:inputs.inRTA===v?BRAND_BG:"#fafafa",color:inputs.inRTA===v?BRAND_DARK:TEXT_MID,fontWeight:inputs.inRTA===v?700:400,fontSize:12,cursor:"pointer"}}>{l}</button>
                    ))}
                  </div>
                </Field>
              )}
            </div>

            {/* DEAL STRUCTURE */}
            <div style={{border:`1.5px solid ${BORDER}`,borderRadius:10,overflow:"hidden"}}>
              <button onClick={()=>setDealOpen(o=>!o)} style={{width:"100%",padding:"13px 16px",background:dealOpen?"#f8fae6":"#fafafa",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",fontFamily:"inherit"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:TEXT_MID}}>Deal Structure</span>
                  {hasDeal&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:BRAND,color:"#1a1f2e",fontWeight:700}}>Active</span>}
                </div>
                <span style={{fontSize:12,color:TEXT_MUTED,display:"inline-block",transform:dealOpen?"rotate(180deg)":"rotate(0deg)",transition:"transform .2s"}}>▾</span>
              </button>
              {dealOpen&&(
                <div style={{padding:"16px",borderTop:`1px solid ${BORDER}`,display:"flex",flexDirection:"column",gap:14,background:"#fff"}}>
                  <div style={{fontSize:11,color:TEXT_MUTED,lineHeight:1.5,padding:"8px 10px",background:"#f8f9fa",borderRadius:6,border:`1px solid ${BORDER}`}}>
                    These fields affect the <strong>taxable base</strong> used for sales/use tax. Rules vary by state — trade-ins always reduce the taxable amount.
                  </div>
                  <Field label="Trade-In Value ($)" hint="Reduces taxable sale price in all states">
                    <DollarInput value={deal.tradeIn||""} onChange={v=>hd("tradeIn",v)} placeholder="0"/>
                  </Field>
                  <Field label="Doc Fee ($)" hint="Taxable in NV, WA, CO, CA — exempt in AZ, ID, NM, WY">
                    <DollarInput value={deal.docFee||""} onChange={v=>hd("docFee",v)} placeholder="0"/>
                  </Field>
                  <Field label="Transport / Delivery Fee ($)" hint="Taxable in NV, AZ, WA, CO — exempt in WY, ID, NM">
                    <DollarInput value={deal.transport||""} onChange={v=>hd("transport",v)} placeholder="0"/>
                  </Field>
                  <Field label="Extended Warranty / GAP ($)" hint="Taxable in NV, WA, CO — exempt in AZ, ID, NM, WY, CA">
                    <DollarInput value={deal.warranty||""} onChange={v=>hd("warranty",v)} placeholder="0"/>
                  </Field>
                  {hasDeal&&(
                    <div style={{padding:"10px 12px",background:BRAND_BG,borderRadius:7,border:`1px solid ${BRAND}40`,fontSize:11}}>
                      <div style={{display:"flex",justifyContent:"space-between",color:TEXT_MID,marginBottom:3}}>
                        <span>Taxable additions</span><span style={{fontWeight:700}}>+${dealTotal.toLocaleString()}</span>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",color:TEXT_MID}}>
                        <span>Trade-in reduction</span><span style={{fontWeight:700,color:"#16a34a"}}>−${dealReductions.toLocaleString()}</span>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* FEE CONFIG */}
            <div style={{border:`1px solid ${BORDER}`,borderRadius:10,padding:16,background:"#fafafa"}}>
              <SectionHeader>Fee Structure</SectionHeader>
              <div style={{marginTop:12}}>
                <Field label="Your Processing Fee (flat)">
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{color:TEXT_MUTED,fontWeight:600}}>$</span>
                    <input type="number" value={procFee} onChange={e=>setProcFee(Number(e.target.value))} style={{...iSt,width:100}}/>
                  </div>
                </Field>
              </div>
              <div style={{marginTop:10,padding:"8px 12px",borderRadius:7,background:CX_BG[cx],border:`1px solid ${CX_COLOR[cx]}25`,fontSize:11,color:CX_COLOR[cx],fontWeight:600}}>
                Auto buffer: {Math.round(BUFFER_RATES[cx]*100)}% ({cx} state) — overage refunded to customer
              </div>
            </div>

            <button onClick={calculate} style={{padding:"14px",borderRadius:9,border:"none",background:BRAND,color:"#1a1f2e",fontSize:14,fontWeight:800,letterSpacing:"0.04em",cursor:"pointer",textTransform:"uppercase",boxShadow:`0 4px 14px ${BRAND}66`}}>
              Calculate Fees →
            </button>
          </div>

          {/* RESULTS PANEL */}
          <div className="results-col" style={{padding:"32px 36px",overflowY:"auto"}}>
            {!results?(
              <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:TEXT_MUTED}}>
                <div style={{width:68,height:68,borderRadius:14,background:BG_CARD,border:`2px dashed ${BORDER}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,marginBottom:16}}>⚡</div>
                <div style={{fontSize:15,fontWeight:600,color:"#9ca3af"}}>Enter vehicle details and click Calculate Fees</div>
                <div style={{fontSize:12,color:"#d1d5db",marginTop:6}}>Deal structure fields are optional but improve tax accuracy</div>
              </div>
            ):(
              <div key={aKey} style={{animation:"slideUp .3s ease",maxWidth:640}}>

                {/* Header */}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:22}}>
                  <div>
                    <h2 style={{margin:0,fontSize:21,fontWeight:800,letterSpacing:"-0.02em"}}>{sd.name} — Fee Breakdown</h2>
                    <div style={{fontSize:12,color:TEXT_MUTED,marginTop:4}}>
                      {inputs.msrp?`MSRP $${Number(inputs.msrp).toLocaleString()}`:""}
                      {inputs.purchasePrice&&inputs.purchasePrice!==inputs.msrp?` · Sale Price $${Number(inputs.purchasePrice).toLocaleString()}`:""}
                      {inputs.year?` · ${inputs.year} model year`:""}
                      {inputs.county?` · ${inputs.county}`:""}
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <span style={{fontSize:10,padding:"4px 10px",borderRadius:20,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:CX_COLOR[cx],background:CX_BG[cx],border:`1px solid ${CX_COLOR[cx]}30`,display:"block",marginBottom:4}}>{cx} state</span>
                    <span style={{fontSize:10,color:TEXT_MUTED}}>Verified {LAST_VERIFIED[sel]}</span>
                  </div>
                </div>

                {/* DMV Fees */}
                {nonTaxLines.length>0&&(
                  <>
                    <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase",color:TEXT_MUTED,marginBottom:8}}>Registration & DMV Fees</div>
                    <div style={{background:BG_CARD,borderRadius:12,border:`1px solid ${BORDER}`,overflow:"hidden",marginBottom:16}}>
                      {nonTaxLines.map((line,i)=>(
                        <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"11px 20px",borderBottom:i<nonTaxLines.length-1?`1px solid ${BORDER}`:"none",background:i%2===0?"#fafafa":"#fff"}}>
                          <div>
                            <div style={{fontSize:13,color:TEXT,fontWeight:500}}>{line.label}</div>
                            {line.note&&<div style={{fontSize:10,color:TEXT_MUTED,marginTop:2}}>{line.note}</div>}
                          </div>
                          <div style={{fontSize:14,fontWeight:700,color:TEXT,whiteSpace:"nowrap",marginLeft:20}}>${line.amount.toFixed(2)}</div>
                        </div>
                      ))}
                      <div style={{display:"flex",justifyContent:"space-between",padding:"11px 20px",background:"#f3f4f6",borderTop:`1px solid ${BORDER}`}}>
                        <span style={{fontSize:12,fontWeight:700,color:TEXT_MID}}>DMV Subtotal</span>
                        <span style={{fontSize:13,fontWeight:800,color:TEXT}}>${regSubtotal.toFixed(2)}</span>
                      </div>
                    </div>
                  </>
                )}

                {/* Sales Tax */}
                {taxLines.length>0&&(
                  <>
                    <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase",color:TEXT_MUTED,marginBottom:8}}>Sales & Use Tax</div>
                    <div style={{background:BG_CARD,borderRadius:12,border:"1px solid #dbeafe",overflow:"hidden",marginBottom:16}}>
                      {taxLines.map((line,i)=>(
                        <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"11px 20px",borderBottom:i<taxLines.length-1?"1px solid #dbeafe":"none",background:i%2===0?"#eff6ff":"#fff"}}>
                          <div>
                            <div style={{fontSize:13,color:"#1e40af",fontWeight:600}}>{line.label}</div>
                            {line.note&&<div style={{fontSize:10,color:"#6b7280",marginTop:2}}>{line.note}</div>}
                          </div>
                          <div style={{fontSize:14,fontWeight:700,color:"#1e40af",whiteSpace:"nowrap",marginLeft:20}}>${line.amount.toFixed(2)}</div>
                        </div>
                      ))}
                      <div style={{display:"flex",justifyContent:"space-between",padding:"11px 20px",background:"#dbeafe",borderTop:"1px solid #bfdbfe"}}>
                        <span style={{fontSize:12,fontWeight:700,color:"#1e40af"}}>Tax Subtotal</span>
                        <span style={{fontSize:13,fontWeight:800,color:"#1e3a8a"}}>${taxSubtotal.toFixed(2)}</span>
                      </div>
                    </div>
                  </>
                )}

                {/* Deal impact note */}
                {hasDeal&&(
                  <div style={{padding:"10px 14px",borderRadius:8,border:`1px solid ${BORDER}`,background:"#fafafa",fontSize:11,color:TEXT_MID,marginBottom:16,lineHeight:1.5}}>
                    <strong>Deal structure applied:</strong> Trade-in −${Number(deal.tradeIn||0).toLocaleString()} · Doc fee +${Number(deal.docFee||0).toLocaleString()} · Transport +${Number(deal.transport||0).toLocaleString()} · Warranty +${Number(deal.warranty||0).toLocaleString()}
                    {" "}→ taxable base adjusted per {sd.name} rules.
                  </div>
                )}

                {/* Totals */}
                <div style={{background:BG_CARD,borderRadius:12,border:`1px solid ${BORDER}`,overflow:"hidden",marginBottom:18}}>
                  <TotalRow label="Registration & DMV Subtotal" value={`$${regSubtotal.toFixed(2)}`} dimmed/>
                  <TotalRow label={`Buffer (${Math.round((bufPct||0)*100)}% on DMV fees only — ${cx} state)`} sub="Overage refunded to customer after DMV processes" value={`$${buf.toFixed(2)}`} color="#d97706"/>
                  {taxSubtotal>0&&<TotalRow label="Sales / Use Tax (exact — no buffer)" sub="Fixed rate on known amount — passed through at cost" value={`$${taxSubtotal.toFixed(2)}`} color="#1e40af"/>}
                  <TotalRow label="Your Processing Fee" sub="Kept regardless of final DMV amount" value={`$${procFee.toFixed(2)}`} color={BRAND_DARK}/>
                  <TotalRow label="Total to Collect from Customer" sub={taxSubtotal>0?"Reg fees + buffer + exact tax + processing fee":"Reg fees + buffer + processing fee"} value={`$${total.toFixed(2)}`} highlight/>
                </div>

                {/* Refund policy */}
                <div style={{padding:16,borderRadius:10,border:"1px solid #bbf7d0",background:"#f0fdf4",fontSize:12,color:"#166534",lineHeight:1.7,marginBottom:18}}>
                  <strong>Overage Refund Policy:</strong> Collect <strong>${total.toFixed(2)}</strong> from the customer. After the DMV processes registration, if actual DMV fees are less than <strong>${(regSubtotal+buf).toFixed(2)}</strong>, refund the difference. {taxSubtotal>0&&<span>The sales/use tax of <strong>${taxSubtotal.toFixed(2)}</strong> is an exact pass-through — no refund expected on that portion. </span>}You keep the <strong>${procFee.toFixed(2)}</strong> processing fee.
                </div>

                {/* Rate update reminder */}
                <div style={{padding:"10px 14px",borderRadius:8,border:"1px solid #fde68a",background:"#fffbeb",fontSize:11,color:"#92400e",lineHeight:1.5,marginBottom:18}}>
                  <strong>⚠ Rate Update Schedule:</strong> {sd.name} — {sd.salesTaxUpdateFreq}. Last verified: {LAST_VERIFIED[sel]}.{" "}{sd.salesTaxNote}
                </div>

                {/* Inputs summary */}
                <div style={{padding:16,borderRadius:10,border:`1px solid ${BORDER}`,background:BG_CARD}}>
                  <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.1em",color:TEXT_MUTED,textTransform:"uppercase",marginBottom:10}}>Inputs Used</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {vinResult&&<Tag label="VIN" value={`${vinResult.year} ${vinResult.make} ${vinResult.model}`}/>}
                    {Object.entries(inputs).filter(([,v])=>v).map(([k,v])=>(
                      <Tag key={k} label={k} value={["msrp","purchasePrice"].includes(k)?`$${Number(v).toLocaleString()}`:v}/>
                    ))}
                    {Object.entries(deal).filter(([,v])=>v&&Number(v)>0).map(([k,v])=>(
                      <Tag key={k} label={k} value={`$${Number(v).toLocaleString()}`}/>
                    ))}
                  </div>
                </div>

              </div>
            )}
          </div>

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
  if("serviceWorker" in navigator){
    window.addEventListener("load",()=>{
      navigator.serviceWorker.register("sw.js").catch(()=>{});
    });
  }
</script>
</body>
</html>
